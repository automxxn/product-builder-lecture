<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>계산기</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-black: #000000;
            --btn-dark: #333333;
            --btn-orange: #FF9F0A;
            --btn-light: #A5A5A5;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 아래쪽부터 배치 */
            height: 100vh;
            overflow: hidden;
            /* 아이폰 하단 홈 바 공간 확보 */
            padding-bottom: calc(20px + var(--safe-area-bottom));
        }

        .calc-container {
            width: 100%;
            max-width: 390px; /* 아이폰 15/16 표준 너비 */
            padding: 0 16px;
        }

        .display-container {
            width: 100%;
            cursor: pointer;
        }

        #display {
            font-size: 94px; /* 더 큼직하게 */
            font-weight: 200; /* 더 얇고 세련되게 */
            color: white;
            text-align: right;
            margin-bottom: 10px;
            padding: 0 20px;
            letter-spacing: -2px;
            transition: font-size 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px; /* 간격을 더 좁히고 정교하게 */
        }

        button {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 50%;
            font-size: 36px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: filter 0.1s, transform 0.1s ease;
            cursor: pointer;
        }

        /* "0" 버튼: 아이폰 계산기의 핵심 (옆으로 긴 타원) */
        .btn-zero {
            grid-column: span 2;
            aspect-ratio: auto;
            height: initial;
            border-radius: 100px;
            justify-content: flex-start;
            padding-left: 32px;
        }

        button:active {
            filter: brightness(1.8); /* 눌렀을 때 색상이 확 밝아짐 */
            transform: scale(0.95);
        }

        /* 색상 배치 */
        .btn-num { background-color: var(--btn-dark); color: white; }
        .btn-op { background-color: var(--btn-orange); color: white; font-size: 42px; }
        .btn-top { background-color: var(--btn-light); color: black; font-size: 30px; }

        /* Secret Messenger UI */
        #messenger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 60px 20px 20px 20px;
            color: #0f0;
            font-family: 'SF Mono', 'Courier New', monospace;
        }
        #messenger h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .login-layer, .device-registration-layer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60%;
            gap: 25px;
        }
        .messenger-input {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background-color: #111;
            border: 1px solid #0f0;
            color: #0f0;
            font-size: 18px;
            text-align: center;
            border-radius: 8px;
            outline: none;
        }
        .messenger-button {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background-color: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
        }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #message-display {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #0f0;
            padding: 15px;
            margin-bottom: 15px;
            list-style: none;
            border-radius: 8px;
        }
        #message-display li { margin-bottom: 10px; line-height: 1.4; word-break: break-all; }
        #message-form { display: flex; gap: 10px; }
        #exit-button {
            position: absolute;
            top: 40px;
            right: 25px;
            background: none;
            border: none;
            color: #0f0;
            font-size: 35px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="display-container" onclick="handleDisplayTap()">
            <div id="display">0</div>
        </div>
        <div id="calculator">
            <div class="grid">
                <button class="btn-top" onclick="clearDisplay()">AC</button>
                <button class="btn-top" onclick="toggleSign()">±</button>
                <button class="btn-top" onclick="percentage()">%</button>
                <button class="btn-op" onclick="handleOperator('/')">÷</button>
                
                <button class="btn-num" onclick="handleNumber('7')">7</button>
                <button class="btn-num" onclick="handleNumber('8')">8</button>
                <button class="btn-num" onclick="handleNumber('9')">9</button>
                <button class="btn-op" onclick="handleOperator('*')">×</button>
                
                <button class="btn-num" onclick="handleNumber('4')">4</button>
                <button class="btn-num" onclick="handleNumber('5')">5</button>
                <button class="btn-num" onclick="handleNumber('6')">6</button>
                <button class="btn-op" onclick="handleOperator('-')">−</button>
                
                <button class="btn-num" onclick="handleNumber('1')">1</button>
                <button class="btn-num" onclick="handleNumber('2')">2</button>
                <button class="btn-num" onclick="handleNumber('3')">3</button>
                <button class="btn-op" onclick="handleOperator('+')">+</button>
                
                <button class="btn-num btn-zero" onclick="handleNumber('0')">0</button>
                <button class="btn-num" onclick="handleNumber('.')">.</button>
                <button class="btn-op" onclick="handleEquals()">=</button>
            </div>
        </div>
    </div>

    <div id="messenger">
        <button id="exit-button" onclick="exitMessenger()">×</button>
        <div class="device-registration-layer">
            <h2>NEW DEVICE</h2>
            <p style="text-align:center; font-size:14px;">Establish a Pre-Shared Key.</p>
            <input type="password" id="register-psk" class="messenger-input" placeholder="Min 8 chars">
            <button class="messenger-button" onclick="registerDevice()">Register</button>
        </div>
        <div class="login-layer">
            <h2>AUTHENTICATE</h2>
            <input type="password" id="login-psk" class="messenger-input" placeholder="PSK">
            <button class="messenger-button" onclick="login()">Access</button>
        </div>
        <div id="chat-ui">
            <h2>E2EE CHANNEL</h2>
            <ul id="message-display"></ul>
            <form id="message-form" action="javascript:void(0);">
                <input type="text" id="message-input" class="messenger-input" placeholder="Secure msg..." style="text-align:left;">
                <button type="submit" class="messenger-button" style="width: 80px;">SEND</button>
            </form>
        </div>
    </div>

    <script>
        const display = document.querySelector('#display');
        let currentInput = '0';
        let operator = null;
        let previousInput = null;
        let shouldResetDisplay = false;
        let secretTriggerState = 0; 
        let displayTapCount = 0;
        let displayTapTimer = null;

        function updateDisplay() {
            display.textContent = currentInput;
            
            // Auto-scaling font size
            const len = currentInput.length;
            if (len > 9) {
                display.style.fontSize = '50px';
            } else if (len > 8) {
                display.style.fontSize = '60px';
            } else if (len > 7) {
                display.style.fontSize = '70px';
            } else if (len > 6) {
                display.style.fontSize = '80px';
            } else {
                display.style.fontSize = '94px';
            }
        }

        function handleNumber(value) {
            if (value === '.') {
                if (secretTriggerState === 2) {
                    initiateSecretMode();
                    return;
                }
                if (currentInput.includes('.')) return;
            }

            if (shouldResetDisplay) {
                currentInput = value;
                shouldResetDisplay = false;
            } else {
                if (currentInput === '0' && value !== '.') {
                    currentInput = value;
                } else {
                    if (currentInput.replace(/[.-]/g, '').length < 9) {
                        currentInput += value;
                    }
                }
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = null;
            operator = null;
            shouldResetDisplay = false;
            secretTriggerState = 0;
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput === '0') return;
            currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
            updateDisplay();
        }

        function percentage() {
            currentInput = (parseFloat(currentInput) / 100).toString().slice(0, 12);
            updateDisplay();
        }

        function handleOperator(op) {
            if (currentInput === '123' && op === '+') {
                secretTriggerState = 1;
            } else {
                secretTriggerState = 0;
            }
            
            if (operator && !shouldResetDisplay) {
                handleEquals();
            }
            operator = op;
            previousInput = currentInput;
            shouldResetDisplay = true;
        }

        function handleEquals() {
            if (!operator || previousInput === null) return;
            
            if (secretTriggerState === 1 && previousInput === '123' && currentInput === '456' && operator === '+') {
                secretTriggerState = 2;
                currentInput = '777'; 
                updateDisplay();
                operator = null;
                previousInput = null;
                shouldResetDisplay = true;
                return;
            }

            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            let result;
            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = prev / current; break;
                default: return;
            }
            
            currentInput = result.toString();
            if (currentInput.length > 12) currentInput = result.toPrecision(8);
            
            operator = null;
            previousInput = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        async function handleDisplayTap() {
            displayTapCount++;
            clearTimeout(displayTapTimer);
            displayTapTimer = setTimeout(() => {
                displayTapCount = 0;
            }, 1500);

            if (displayTapCount === 5) {
                const deviceId = await generateDeviceId();
                alert("Device ID: " + deviceId);
                displayTapCount = 0;
            }
        }
        
        // --- SECRET MESSENGER LOGIC ---
        const messengerUI = document.getElementById('messenger');
        const deviceRegistrationLayer = document.querySelector('.device-registration-layer');
        const loginLayer = document.querySelector('.login-layer');
        const chatUI = document.getElementById('chat-ui');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messageDisplay = document.getElementById('message-display');

        let encryptionKey = null;
        let firebaseDb = null;

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        async function generateDeviceId() {
            const { userAgent, language, hardwareConcurrency, deviceMemory } = navigator;
            const screen = window.screen;
            const fingerprint = `${userAgent}${language}${hardwareConcurrency}${deviceMemory}${screen.width}${screen.height}${screen.colorDepth}`;
            const encoder = new TextEncoder();
            const data = encoder.encode(fingerprint);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function deriveKeyFromPSK(psk, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(psk), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                true,
                ['encrypt', 'decrypt']
            );
        }

        async function encryptMessage(text, key) {
            const enc = new TextEncoder();
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(text));
            const ivAndCiphertext = new Uint8Array(iv.length + ciphertext.byteLength);
            ivAndCiphertext.set(iv);
            ivAndCiphertext.set(new Uint8Array(ciphertext), iv.length);
            return btoa(String.fromCharCode.apply(null, ivAndCiphertext));
        }

        async function decryptMessage(b64Ciphertext, key) {
            try {
                const ivAndCiphertext = new Uint8Array(atob(b64Ciphertext).split('').map(c => c.charCodeAt(0)));
                const iv = ivAndCiphertext.slice(0, 12);
                const ciphertext = ivAndCiphertext.slice(12);
                const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[DECRYPTION FAILED]";
            }
        }
        
        async function initiateSecretMode() {
            messengerUI.style.display = 'flex';
            const deviceId = await generateDeviceId();
            const registeredDeviceId = localStorage.getItem('deviceId');
            if (deviceId === registeredDeviceId) {
                deviceRegistrationLayer.style.display = 'none';
                loginLayer.style.display = 'flex';
                chatUI.style.display = 'none';
            } else {
                deviceRegistrationLayer.style.display = 'flex';
                loginLayer.style.display = 'none';
                chatUI.style.display = 'none';
            }
            clearDisplay();
        }
        
        async function registerDevice() {
            const pskInput = document.getElementById('register-psk');
            if (pskInput.value.length < 8) {
                alert('Min 8 characters required.');
                return;
            }
            const deviceId = await generateDeviceId();
            localStorage.setItem('deviceId', deviceId);
            alert('Device Authenticated.');
            initiateSecretMode();
        }

        async function login() {
            const pskInput = document.getElementById('login-psk');
            const psk = pskInput.value;
            if (!psk) return;
            try {
                const deviceId = await generateDeviceId();
                encryptionKey = await deriveKeyFromPSK(psk, deviceId);
                if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
                firebaseDb = firebase.database();
                loginLayer.style.display = 'none';
                chatUI.style.display = 'flex';
                listenForMessages();
            } catch (error) {
                alert("Auth Error.");
            }
        }
        
        async function sendMessage() {
            const text = messageInput.value;
            if (text.trim() === '' || !encryptionKey || !firebaseDb) return;
            try {
                const encryptedText = await encryptMessage(text, encryptionKey);
                firebaseDb.ref('messages').push({ ct: encryptedText, ts: firebase.database.ServerValue.TIMESTAMP });
                messageInput.value = '';
            } catch (error) {
                alert("Send fail.");
            }
        }

        function listenForMessages() {
            const messagesRef = firebaseDb.ref('messages');
            messagesRef.on('child_added', async (snapshot) => {
                const msgData = snapshot.val();
                if (msgData && msgData.ct) {
                    const decryptedText = await decryptMessage(msgData.ct, encryptionKey);
                    if (decryptedText !== "[DECRYPTION FAILED]") {
                        displayMessage(decryptedText);
                        snapshot.ref.remove();
                    } else {
                        displayMessage("[GARBLED DATA DELETED]");
                        snapshot.ref.remove();
                    }
                }
            });
        }
        
        function displayMessage(text) {
            const li = document.createElement('li');
            li.textContent = "> " + text;
            messageDisplay.appendChild(li);
            messageDisplay.scrollTop = messageDisplay.scrollHeight;
        }
        
        function exitMessenger() {
            if (firebaseDb) firebaseDb.ref('messages').off();
            encryptionKey = null;
            firebaseDb = null;
            document.getElementById('login-psk').value = '';
            document.getElementById('register-psk').value = '';
            messageInput.value = '';
            messageDisplay.innerHTML = '';
            messengerUI.style.display = 'none';
        }

        messageForm.addEventListener('submit', sendMessage);
    </script>
</body>
</html>
