<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>계산기</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-black: #000000;
            --btn-dark: #333333;
            --btn-gray: #a5a5a5;
            --btn-orange: #ff9f0a;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        
        body { 
            background-color: var(--bg-black); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            overflow: hidden;
        }

        /* 결과 화면 */
        .display-container {
            padding: 0 30px 10px;
            text-align: right;
            cursor: pointer;
        }
        #display {
            color: white;
            font-size: 90px;
            font-weight: 300;
            letter-spacing: -2px;
            white-space: nowrap;
            overflow: hidden;
            transition: font-size 0.15s ease;
        }

        /* 버튼 격자 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 20px;
        }

        button {
            aspect-ratio: 1;
            border: none;
            border-radius: 50%;
            font-size: 36px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, transform 0.1s ease;
            cursor: pointer;
            outline: none;
        }

        button:active { 
            filter: brightness(1.6); 
            transform: scale(0.95);
        }

        .btn-num { background-color: var(--btn-dark); color: white; }
        .btn-func { background-color: var(--btn-gray); color: black; font-size: 30px; }
        .btn-op { background-color: var(--btn-orange); color: white; font-size: 40px; }
        
        .btn-zero {
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 100px;
            justify-content: flex-start;
            padding-left: 35px;
            height: 100%;
        }

        /* Secret Messenger UI */
        #messenger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 60px 20px 20px 20px;
            color: #0f0;
            font-family: 'SF Mono', 'Courier New', monospace;
        }
        #messenger h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .login-layer, .device-registration-layer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60%;
            gap: 25px;
        }
        .messenger-input {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background-color: #111;
            border: 1px solid #0f0;
            color: #0f0;
            font-size: 18px;
            text-align: center;
            border-radius: 8px;
            outline: none;
        }
        .messenger-button {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background-color: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
        }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #message-display {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #0f0;
            padding: 15px;
            margin-bottom: 15px;
            list-style: none;
            border-radius: 8px;
        }
        #message-display li { margin-bottom: 10px; line-height: 1.4; word-break: break-all; }
        #message-form { display: flex; gap: 10px; }
        #exit-button {
            position: absolute;
            top: 40px;
            right: 25px;
            background: none;
            border: none;
            color: #0f0;
            font-size: 35px;
            cursor: pointer;
        }

        /* [Secret Layer from snippet] */
        #secret-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="display-container" onclick="handleDisplayTap()">
    <div id="display">0</div>
</div>

<div class="grid">
    <button class="btn-func" id="clearBtn" onclick="handleClear()">AC</button>
    <button class="btn-func" onclick="toggleSign()">±</button>
    <button class="btn-func" onclick="percentage()">%</button>
    <button class="btn-op" onclick="handleOperator('/')">÷</button>

    <button class="btn-num" onclick="inputNum('7')">7</button>
    <button class="btn-num" onclick="inputNum('8')">8</button>
    <button class="btn-num" onclick="inputNum('9')">9</button>
    <button class="btn-op" onclick="handleOperator('*')">×</button>

    <button class="btn-num" onclick="inputNum('4')">4</button>
    <button class="btn-num" onclick="inputNum('5')">5</button>
    <button class="btn-num" onclick="inputNum('6')">6</button>
    <button class="btn-op" onclick="handleOperator('-')">－</button>

    <button class="btn-num" onclick="inputNum('1')">1</button>
    <button class="btn-num" onclick="inputNum('2')">2</button>
    <button class="btn-num" onclick="inputNum('3')">3</button>
    <button class="btn-op" onclick="handlePlusClick()">+</button>

    <button class="btn-num btn-zero" onclick="inputNum('0')">0</button>
    <button class="btn-num" onclick="inputNum('.')">.</button>
    <button class="btn-op" onclick="handleEquals()">＝</button>
</div>

<!-- REAL Messenger UI -->
<div id="messenger">
    <button id="exit-button" onclick="exitMessenger()">×</button>
    <div class="device-registration-layer">
        <h2>NEW DEVICE</h2>
        <p style="text-align:center; font-size:14px;">Establish a Pre-Shared Key.</p>
        <input type="password" id="register-psk" class="messenger-input" placeholder="Min 8 chars">
        <button class="messenger-button" onclick="registerDevice()">Register</button>
    </div>
    <div class="login-layer">
        <h2>AUTHENTICATE</h2>
        <input type="password" id="login-psk" class="messenger-input" placeholder="PSK">
        <button class="messenger-button" onclick="login()">Access</button>
    </div>
    <div id="chat-ui">
        <h2>E2EE CHANNEL</h2>
        <ul id="message-display"></ul>
        <form id="message-form" action="javascript:void(0);">
            <input type="text" id="message-input" class="messenger-input" placeholder="Secure msg..." style="text-align:left;">
            <button type="submit" class="messenger-button" style="width: 80px;">SEND</button>
        </form>
    </div>
</div>

<!-- [Secret Layer from snippet] -->
<div id="secret-layer" onclick="this.style.display='none'">
    <h1 style="color: #00ff41; font-family: monospace;">AGENT VERIFIED</h1>
    <p style="color: #555;">SECURE LINE ESTABLISHED...</p>
</div>

<script>
    let currentVal = "0";
    let previousVal = null;
    let operator = null;
    let isCalculated = false;
    let shouldResetDisplay = false;
    let secretTriggerState = 0; 
    let displayTapCount = 0;
    let displayTapTimer = null;

    const display = document.getElementById('display');
    const clearBtn = document.getElementById('clearBtn');

    function updateUI() {
        display.innerText = currentVal;
        
        // [AC/C 로직 핵심]
        if (isCalculated || currentVal === "0") {
            clearBtn.innerText = "AC";
        } else {
            clearBtn.innerText = "C";
        }

        // 폰트 크기 조절
        const len = currentVal.length;
        if (len > 9) display.style.fontSize = "40px";
        else if (len > 8) display.style.fontSize = "50px";
        else if (len > 7) display.style.fontSize = "60px";
        else if (len > 6) display.style.fontSize = "70px";
        else display.style.fontSize = "90px";
    }

    function inputNum(num) {
        if (num === '.') {
            // [Secret Messenger Trigger Check]
            if (secretTriggerState === 2) {
                initiateSecretMode();
                return;
            }
            if (currentVal.includes('.')) return;
        }

        if (isCalculated || shouldResetDisplay || (currentVal === "0" && num !== ".")) {
            currentVal = num;
            isCalculated = false;
            shouldResetDisplay = false;
        } else {
            if (currentVal.replace(/[.-]/g, '').length < 9) {
                currentVal += num;
            }
        }
        updateUI();
    }

    function handleClear() {
        currentVal = "0";
        previousVal = null;
        operator = null;
        isCalculated = false;
        shouldResetDisplay = false;
        secretTriggerState = 0;
        updateUI();
    }

    function toggleSign() {
        if (currentVal === "0") return;
        currentVal = currentVal.startsWith('-') ? currentVal.slice(1) : '-' + currentVal;
        updateUI();
    }

    function percentage() {
        currentVal = (parseFloat(currentVal) / 100).toString().slice(0, 12);
        updateUI();
    }

    function handleOperator(op) {
        if (currentVal === "123" && op === "*") { // Legacy or alternative secret trigger check
             // Not changing the main logic but keeping context
        }
        
        if (operator && !shouldResetDisplay) {
            calculate();
        }
        
        operator = op;
        previousVal = currentVal;
        shouldResetDisplay = true;
    }

    function handlePlusClick() {
        // [Secret Trigger from snippet]
        if (currentVal === "123") {
            document.getElementById('secret-layer').style.display = 'flex';
            return;
        }
        
        // [Existing Messenger Trigger Logic]
        if (currentVal === "123") {
            secretTriggerState = 1;
        } else {
            secretTriggerState = 0;
        }
        
        handleOperator('+');
    }

    function handleEquals() {
        if (!operator || previousVal === null) {
            isCalculated = true;
            updateUI();
            return;
        }

        // [Secret Messenger Trigger State Step 2]
        if (secretTriggerState === 1 && previousVal === "123" && currentVal === "456" && operator === "+") {
            secretTriggerState = 2;
            currentVal = "777";
            isCalculated = true;
            shouldResetDisplay = true;
            updateUI();
            operator = null;
            previousVal = null;
            return;
        }

        calculate();
        isCalculated = true;
        updateUI();
    }

    function calculate() {
        const prev = parseFloat(previousVal);
        const current = parseFloat(currentVal);
        let result;
        switch (operator) {
            case '+': result = prev + current; break;
            case '-': result = prev - current; break;
            case '*': result = prev * current; break;
            case '/': result = prev / current; break;
            default: return;
        }
        currentVal = result.toString();
        if (currentVal.length > 12) currentVal = result.toPrecision(8);
        operator = null;
        previousVal = null;
        shouldResetDisplay = true;
    }

    async function handleDisplayTap() {
        displayTapCount++;
        clearTimeout(displayTapTimer);
        displayTapTimer = setTimeout(() => {
            displayTapCount = 0;
        }, 1500);

        if (displayTapCount === 5) {
            const deviceId = await generateDeviceId();
            alert("Device ID: " + deviceId);
            displayTapCount = 0;
        }
    }
    
    // --- SECRET MESSENGER LOGIC (E2EE/Firebase) ---
    const messengerUI = document.getElementById('messenger');
    const deviceRegistrationLayer = document.querySelector('.device-registration-layer');
    const loginLayer = document.querySelector('.login-layer');
    const chatUI = document.getElementById('chat-ui');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');
    const messageDisplay = document.getElementById('message-display');

    let encryptionKey = null;
    let firebaseDb = null;

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    async function generateDeviceId() {
        const { userAgent, language, hardwareConcurrency, deviceMemory } = navigator;
        const screen = window.screen;
        const fingerprint = `${userAgent}${language}${hardwareConcurrency}${deviceMemory}${screen.width}${screen.height}${screen.colorDepth}`;
        const encoder = new TextEncoder();
        const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(fingerprint));
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function deriveKeyFromPSK(psk, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(psk), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            true,
            ['encrypt', 'decrypt']
        );
    }

    async function encryptMessage(text, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, new TextEncoder().encode(text));
        const combined = new Uint8Array(iv.length + ciphertext.byteLength);
        combined.set(iv);
        combined.set(new Uint8Array(ciphertext), iv.length);
        return btoa(String.fromCharCode.apply(null, combined));
    }

    async function decryptMessage(b64, key) {
        try {
            const combined = new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(0)));
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: combined.slice(0, 12) }, key, combined.slice(12));
            return new TextDecoder().decode(decrypted);
        } catch (e) { return "[DECRYPTION FAILED]"; }
    }
    
    async function initiateSecretMode() {
        messengerUI.style.display = 'flex';
        const deviceId = await generateDeviceId();
        if (deviceId === localStorage.getItem('deviceId')) {
            deviceRegistrationLayer.style.display = 'none';
            loginLayer.style.display = 'flex';
        } else {
            deviceRegistrationLayer.style.display = 'flex';
            loginLayer.style.display = 'none';
        }
        chatUI.style.display = 'none';
        handleClear();
    }
    
    async function registerDevice() {
        const psk = document.getElementById('register-psk').value;
        if (psk.length < 8) { alert('Min 8 characters.'); return; }
        localStorage.setItem('deviceId', await generateDeviceId());
        alert('Device Authenticated.');
        initiateSecretMode();
    }

    async function login() {
        const psk = document.getElementById('login-psk').value;
        if (!psk) return;
        try {
            encryptionKey = await deriveKeyFromPSK(psk, await generateDeviceId());
            if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
            firebaseDb = firebase.database();
            loginLayer.style.display = 'none';
            chatUI.style.display = 'flex';
            listenForMessages();
        } catch (error) { alert("Auth Error."); }
    }
    
    async function sendMessage() {
        const text = messageInput.value;
        if (text.trim() === '' || !encryptionKey || !firebaseDb) return;
        try {
            const ct = await encryptMessage(text, encryptionKey);
            firebaseDb.ref('messages').push({ ct, ts: firebase.database.ServerValue.TIMESTAMP });
            messageInput.value = '';
        } catch (error) { alert("Send fail."); }
    }

    function listenForMessages() {
        firebaseDb.ref('messages').on('child_added', async (snap) => {
            const data = snap.val();
            if (data && data.ct) {
                const dt = await decryptMessage(data.ct, encryptionKey);
                if (dt !== "[DECRYPTION FAILED]") {
                    displayMessage(dt); snap.ref.remove();
                } else {
                    displayMessage("[GARBLED DATA DELETED]"); snap.ref.remove();
                }
            }
        });
    }
    
    function displayMessage(text) {
        const li = document.createElement('li');
        li.textContent = "> " + text;
        messageDisplay.appendChild(li);
        messageDisplay.scrollTop = messageDisplay.scrollHeight;
    }
    
    function exitMessenger() {
        if (firebaseDb) firebaseDb.ref('messages').off();
        encryptionKey = null; firebaseDb = null;
        document.getElementById('login-psk').value = '';
        document.getElementById('register-psk').value = '';
        messageInput.value = ''; messageDisplay.innerHTML = '';
        messengerUI.style.display = 'none';
    }

    messageForm.addEventListener('submit', sendMessage);
</script>
</body>
</html>
