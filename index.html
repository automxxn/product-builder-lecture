<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>계산기</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-dark-gray: #333333;
            --ios-light-gray: #A5A5A5;
            --ios-orange: #FF9F0A;
            --ios-white: #FFFFFF;
            --ios-black: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        
        body { 
            background-color: var(--ios-bg); 
            display: flex; justify-content: center; align-items: flex-end;
            height: 100vh; width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .calc-container {
            width: 100%; 
            max-width: 400px; 
            padding: 0 20px 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .display-container { 
            text-align: right; 
            padding: 0 20px 10px 20px; 
            cursor: pointer; 
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        #display {
            color: var(--ios-white); 
            font-size: 64px; 
            font-weight: 200;
            letter-spacing: -1px; 
            white-space: nowrap; 
            overflow: hidden;
            transition: font-size 0.1s ease;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 14px; 
            width: 100%;
        }

        button.calc-btn {
            width: 100%;
            aspect-ratio: 1 / 1; 
            border: none; 
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            outline: none;
            padding: 0;
            font-family: inherit;
            font-size: 32px;
            font-weight: 400;
            transition: background-color 0.1s;
            overflow: hidden;
        }

        /* Colors & States */
        .btn-num { background-color: var(--ios-dark-gray); color: var(--ios-white); }
        .btn-num:active { background-color: #737373; }

        .btn-func { background-color: var(--ios-light-gray); color: var(--ios-black); font-size: 26px; }
        .btn-func:active { background-color: #D4D4D2; }

        .btn-op { background-color: var(--ios-orange); color: var(--ios-white); font-size: 38px; }
        .btn-op:active { background-color: #FFFFFF; color: var(--ios-orange); }

        /* Messenger UI */
        #messenger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 1000; display: none; flex-direction: column; padding: 60px 20px 20px 20px; color: #00ff41; font-family: 'SF Mono', 'Courier New', monospace; }
        #messenger h2 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .login-layer, .device-registration-layer { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 60%; gap: 25px; }
        .messenger-input { width: 100%; max-width: 320px; padding: 15px; background-color: #111; border: 1px solid #00ff41; color: #00ff41; font-size: 18px; text-align: center; border-radius: 8px; outline: none; }
        .messenger-button { width: 100%; max-width: 320px; padding: 15px; background-color: #00ff41; color: #000; border: none; cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 8px; }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #message-display { flex-grow: 1; overflow-y: auto; border: 1px solid #00ff41; padding: 15px; margin-bottom: 15px; list-style: none; border-radius: 8px; }
        #message-display li { margin-bottom: 10px; line-height: 1.4; word-break: break-all; }
        #message-form { display: flex; gap: 10px; }
        #exit-button { position: absolute; top: 40px; right: 25px; background: none; border: none; color: #00ff41; font-size: 35px; cursor: pointer; }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="display-container" onclick="handleDisplayTap()">
        <div id="display">0</div>
    </div>

    <div class="grid">
        <!-- Row 1: Backspace, AC, %, ÷ -->
        <button class="calc-btn btn-func" onclick="handleBackspace()">⌫</button>
        <button class="calc-btn btn-func" id="clearBtn" onclick="handleClear()">AC</button>
        <button class="calc-btn btn-func" onclick="handlePercentage()">%</button>
        <button class="calc-btn btn-op" onclick="handleOperator('/')">÷</button>

        <!-- Row 2: 7, 8, 9, × -->
        <button class="calc-btn btn-num" onclick="inputNum('7')">7</button>
        <button class="calc-btn btn-num" onclick="inputNum('8')">8</button>
        <button class="calc-btn btn-num" onclick="inputNum('9')">9</button>
        <button class="calc-btn btn-op" onclick="handleOperator('*')">×</button>

        <!-- Row 3: 4, 5, 6, - -->
        <button class="calc-btn btn-num" onclick="inputNum('4')">4</button>
        <button class="calc-btn btn-num" onclick="inputNum('5')">5</button>
        <button class="calc-btn btn-num" onclick="inputNum('6')">6</button>
        <button class="calc-btn btn-op" onclick="handleOperator('-')">－</button>

        <!-- Row 4: 1, 2, 3, + -->
        <button class="calc-btn btn-num" onclick="inputNum('1')">1</button>
        <button class="calc-btn btn-num" onclick="inputNum('2')">2</button>
        <button class="calc-btn btn-num" onclick="inputNum('3')">3</button>
        <button class="calc-btn btn-op" onclick="handlePlusClick()">+</button>

        <!-- Row 5: ±, 0, ., = -->
        <button class="calc-btn btn-num" onclick="toggleSign()">+/-</button>
        <button class="calc-btn btn-num" onclick="inputNum('0')">0</button>
        <button class="calc-btn btn-num" onclick="inputNum('.')">.</button>
        <button class="calc-btn btn-op" onclick="handleEquals()">＝</button>
    </div>
</div>

<div id="messenger">
    <button id="exit-button" onclick="exitMessenger()">×</button>
    <div class="device-registration-layer">
        <h2>NEW DEVICE</h2>
        <p style="text-align:center; font-size:14px;">Establish a Pre-Shared Key.</p>
        <input type="password" id="register-psk" class="messenger-input" placeholder="Min 8 chars">
        <button class="messenger-button" onclick="registerDevice()">Register</button>
    </div>
    <div class="login-layer">
        <h2>AUTHENTICATE</h2>
        <input type="password" id="login-psk" class="messenger-input" placeholder="PSK">
        <button class="messenger-button" onclick="login()">Access</button>
    </div>
    <div id="chat-ui">
        <h2>E2EE CHANNEL</h2>
        <ul id="message-display"></ul>
        <form id="message-form" action="javascript:void(0);">
            <input type="text" id="message-input" class="messenger-input" placeholder="Secure msg..." style="text-align:left;">
            <button type="submit" class="messenger-button" style="width: 80px;">SEND</button>
        </form>
    </div>
</div>

<script>
    let currentVal = "0";
    let fullExpression = "";
    let isCalculated = false;
    let lastInputIsOperator = false;
    let displayTapCount = 0;
    let displayTapTimer = null;

    const display = document.getElementById('display');
    const clearBtn = document.getElementById('clearBtn');

    function updateUI() {
        let displayStr = fullExpression === "" ? currentVal : fullExpression.replace(/\*/g, '×').replace(/\//g, '÷').replace(/-/g, '－') + (lastInputIsOperator ? "" : currentVal);
        display.innerText = displayStr;
        
        if (currentVal === "0" && fullExpression === "") {
            clearBtn.innerText = "AC";
        } else {
            clearBtn.innerText = "C";
        }

        // Dynamic font size
        const len = displayStr.length;
        if (len > 15) display.style.fontSize = "30px";
        else if (len > 12) display.style.fontSize = "40px";
        else if (len > 9) display.style.fontSize = "50px";
        else display.style.fontSize = "64px";
    }

    function inputNum(num) {
        if (num === '.') {
            if (fullExpression === "123 + 456" && currentVal === "777") { initiateSecretMode(); return; }
            if (currentVal.includes('.')) return;
        }
        if (isCalculated) { currentVal = num; fullExpression = ""; isCalculated = false; }
        else if (currentVal === "0" && num !== ".") { currentVal = num; }
        else { if (currentVal.length < 9) currentVal += num; }
        lastInputIsOperator = false;
        updateUI();
    }

    function handleOperator(op) {
        if (isCalculated) { fullExpression = currentVal + " " + op + " "; isCalculated = false; }
        else if (lastInputIsOperator) { fullExpression = fullExpression.slice(0, -3) + " " + op + " "; }
        else { fullExpression += currentVal + " " + op + " "; }
        currentVal = "0";
        lastInputIsOperator = true;
        updateUI();
    }

    function handlePlusClick() {
        if (currentVal === "123") { /* Secret Check Step 1 */ }
        handleOperator('+');
    }

    function handleEquals() {
        if (fullExpression === "") return;
        if (fullExpression === "123 + " && currentVal === "456") { currentVal = "777"; fullExpression = "123 + 456"; isCalculated = true; updateUI(); return; }
        try {
            let expr = (fullExpression + currentVal).replace(/－/g, '-');
            let result = eval(expr);
            fullExpression = "";
            currentVal = result.toString();
            if (currentVal.length > 10) currentVal = result.toPrecision(8);
            isCalculated = true;
            lastInputIsOperator = false;
            updateUI();
        } catch (e) { handleClear(); }
    }

    function handleClear() {
        currentVal = "0"; fullExpression = ""; isCalculated = false; lastInputIsOperator = false;
        updateUI();
    }

    function handleBackspace() {
        if (isCalculated) { handleClear(); return; }
        if (currentVal.length > 1) { currentVal = currentVal.slice(0, -1); }
        else { currentVal = "0"; }
        updateUI();
    }

    function toggleSign() {
        if (currentVal === "0") return;
        currentVal = currentVal.startsWith('-') ? currentVal.slice(1) : '-' + currentVal;
        updateUI();
    }

    function handlePercentage() {
        currentVal = (parseFloat(currentVal) / 100).toString();
        updateUI();
    }

    async function handleDisplayTap() {
        displayTapCount++; clearTimeout(displayTapTimer);
        displayTapTimer = setTimeout(() => { displayTapCount = 0; }, 1500);
        if (displayTapCount === 5) { const deviceId = await generateDeviceId(); alert("Device ID: " + deviceId); displayTapCount = 0; }
    }

    // --- SECRET MESSENGER LOGIC ---
    const messengerUI = document.getElementById('messenger');
    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_AUTH_DOMAIN", databaseURL: "YOUR_DATABASE_URL", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_STORAGE_BUCKET", messagingSenderId: "YOUR_MESSAGING_SENDER_ID", appId: "YOUR_APP_ID" };
    async function generateDeviceId() { const { userAgent, language, hardwareConcurrency, deviceMemory } = navigator; const screen = window.screen; const fingerprint = `${userAgent}${language}${hardwareConcurrency}${deviceMemory}${screen.width}${screen.height}${screen.colorDepth}`; const encoder = new TextEncoder(); const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(fingerprint)); return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join(''); }
    async function deriveKeyFromPSK(psk, salt) { const enc = new TextEncoder(); const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(psk), 'PBKDF2', false, ['deriveKey']); return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']); }
    async function encryptMessage(text, key) { const iv = crypto.getRandomValues(new Uint8Array(12)); const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, new TextEncoder().encode(text)); const combined = new Uint8Array(iv.length + ciphertext.byteLength); combined.set(iv); combined.set(new Uint8Array(ciphertext), iv.length); return btoa(String.fromCharCode.apply(null, combined)); }
    async function decryptMessage(b64, key) { try { const combined = new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(0))); const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: combined.slice(0, 12) }, key, combined.slice(12)); return new TextDecoder().decode(decrypted); } catch (e) { return "[DECRYPTION FAILED]"; } }
    async function initiateSecretMode() { messengerUI.style.display = 'flex'; const deviceId = await generateDeviceId(); if (deviceId === localStorage.getItem('deviceId')) { document.querySelector('.device-registration-layer').style.display = 'none'; document.querySelector('.login-layer').style.display = 'flex'; } else { document.querySelector('.device-registration-layer').style.display = 'flex'; document.querySelector('.login-layer').style.display = 'none'; } document.getElementById('chat-ui').style.display = 'none'; handleClear(); }
    async function registerDevice() { const psk = document.getElementById('register-psk').value; if (psk.length < 8) { alert('최소 8자리 이상의 키를 입력하세요.'); return; } localStorage.setItem('deviceId', await generateDeviceId()); alert('기기가 등록되었습니다.'); initiateSecretMode(); }
    async function login() { const psk = document.getElementById('login-psk').value; if (!psk) return; try { const deviceId = await generateDeviceId(); const encryptionKeyMaterial = await deriveKeyFromPSK(psk, deviceId); encryptionKey = encryptionKeyMaterial; if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig); firebaseDb = firebase.database(); document.querySelector('.login-layer').style.display = 'none'; document.getElementById('chat-ui').style.display = 'flex'; listenForMessages(); } catch (error) { alert("인증 오류."); } }
    async function sendMessage() { const text = document.getElementById('message-input').value; if (text.trim() === '' || !encryptionKey || !firebaseDb) return; try { const ct = await encryptMessage(text, encryptionKey); firebaseDb.ref('messages').push({ ct, ts: firebase.database.ServerValue.TIMESTAMP }); document.getElementById('message-input').value = ''; } catch (error) { alert("전송 실패."); } }
    function listenForMessages() { firebaseDb.ref('messages').on('child_added', async (snap) => { const data = snap.val(); if (data && data.ct) { const dt = await decryptMessage(data.ct, encryptionKey); if (dt !== "[DECRYPTION FAILED]") { displayMessage(dt); snap.ref.remove(); } else { displayMessage("[해독 불가 삭제]"); snap.ref.remove(); } } }); }
    function displayMessage(text) { const li = document.createElement('li'); li.textContent = "> " + text; document.getElementById('message-display').appendChild(li); document.getElementById('message-display').scrollTop = document.getElementById('message-display').scrollHeight; }
    function exitMessenger() { if (firebaseDb) firebaseDb.ref('messages').off(); encryptionKey = null; firebaseDb = null; document.getElementById('login-psk').value = ''; document.getElementById('register-psk').value = ''; document.getElementById('message-input').value = ''; document.getElementById('message-display').innerHTML = ''; messengerUI.style.display = 'none'; }
    document.getElementById('message-form').addEventListener('submit', sendMessage);
    updateUI();
</script>
</body>
</html>
